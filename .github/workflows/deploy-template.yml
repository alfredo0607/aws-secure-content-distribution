name: Build & Deploy (reutilizable)

# Otros repositorios llaman este workflow con:
#
#   jobs:
#     deploy:
#       uses: alfredo0607/aws-secure-content-distribution/.github/workflows/deploy-template.yml@main
#       with:
#         container_name: mi-api
#         host_port: 3001
#         build_context: .
#       secrets:
#         EC2_HOST: ${{ secrets.EC2_HOST }}
#         EC2_USER: ${{ secrets.EC2_USER }}
#         EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

on:
  workflow_call:
    inputs:
      container_name:
        description: "Nombre único del contenedor en EC2 (p.ej. content-distribution)"
        required: true
        type: string
      host_port:
        description: "Puerto del host EC2 mapeado al 3000 del contenedor (p.ej. 3001)"
        required: true
        type: number
      build_context:
        description: "Ruta al Dockerfile desde la raíz del repo (p.ej. . o ./backend)"
        required: false
        type: string
        default: "."
    secrets:
      EC2_HOST:
        required: true
      EC2_USER:
        required: true
      EC2_SSH_KEY:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (soporte ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy → EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          CONTAINER: ${{ inputs.container_name }}
          HOST_PORT: ${{ inputs.host_port }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,IMAGE,CONTAINER,HOST_PORT
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            ~/deploy.sh "$IMAGE" "$CONTAINER" "$HOST_PORT"
